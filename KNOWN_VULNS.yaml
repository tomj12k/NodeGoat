# KNOWN_VULNS — ground-truth vulnerability catalog
# Purpose: answer key for benchmarking Scantonomous scan findings against this app.
# Diff scanner output vs. this file: a hit on a `vulnerable_source` path == true positive.
# Schema per entry: id, category, cwe, owasp, route, parameter, vulnerable_source, secure_source, notes.

app: NodeGoat
full_name: OWASP NodeGoat
upstream: https://github.com/OWASP/NodeGoat
fork: https://github.com/tomj12k/NodeGoat
language: JavaScript
scan_surface: [SAST-node, DAST-web]
catalog_notes: >
  NodeGoat is a tutorial app; each vuln has an adjacent commented-out "Fix for A#"
  block in-source (the intended remediation). It does not ship separate hardened
  files, so secure_source is empty. Tutorial-to-OWASP mapping lives in
  app/views/tutorial/a1.html..a10.html, redos.html, ssrf.html.

vulns:
  - id: nodegoat-ssjs-eval
    category: Server-Side JavaScript Injection (eval)
    cwe: [CWE-95]
    owasp: A03:2021-Injection
    route: POST /contributions
    parameter: [preTax, afterTax, roth]
    vulnerable_source: [app/routes/contributions.js]
    secure_source: []
    notes: eval(req.body.preTax) etc. around lines 31-34.

  - id: nodegoat-nosql-injection
    category: NoSQL Injection ($where)
    cwe: [CWE-943]
    owasp: A03:2021-Injection
    route: GET /allocations/:userId
    parameter: [threshold, userId]
    vulnerable_source: [app/data/allocations-dao.js, app/routes/allocations.js]
    secure_source: []
    notes: $where string concatenation, allocations-dao.js lines ~60-84.

  - id: nodegoat-xss-stored-memos
    category: Stored XSS (memos rendered as markdown/HTML)
    cwe: [CWE-79]
    owasp: A03:2021-Injection
    route: POST /memos -> GET /memos
    parameter: [memo]
    vulnerable_source: [app/routes/memos.js, app/data/memos-dao.js, app/views/memos.html]
    secure_source: []
    notes: memos.html {{ marked(doc.memo) }}; marked sanitize fix hook in server.js.

  - id: nodegoat-xss-profile
    category: Reflected/Stored XSS (profile, wrong-context encoding)
    cwe: [CWE-79]
    owasp: A03:2021-Injection
    route: GET/POST /profile
    parameter: [firstName, website, lastName, ssn, address, bankAcc]
    vulnerable_source: [app/routes/profile.js, app/views/profile.html, server.js]
    secure_source: []
    notes: 'website encoded for HTML but rendered into href (javascript: URI); Swig autoescape disabled in server.js.'

  - id: nodegoat-log-injection
    category: Log Injection / CRLF log forging
    cwe: [CWE-117]
    owasp: A09:2021-Security Logging and Monitoring Failures
    route: POST /login
    parameter: [userName]
    vulnerable_source: [app/routes/session.js]
    secure_source: []
    notes: console.log of raw userName, ESAPI-encode fix commented out.

  - id: nodegoat-idor-allocations
    category: IDOR / Missing Access Control
    cwe: [CWE-639]
    owasp: A01:2021-Broken Access Control
    route: GET /allocations/:userId
    parameter: [userId]
    vulnerable_source: [app/routes/allocations.js]
    secure_source: []
    notes: userId taken from URL param instead of session; fix comment says use req.session.userId.

  - id: nodegoat-missing-function-access-control
    category: Missing Function-Level Access Control (benefits)
    cwe: [CWE-285]
    owasp: A01:2021-Broken Access Control
    route: GET/POST /benefits
    parameter: [userId, benefitStartDate]
    vulnerable_source: [app/routes/index.js, app/routes/benefits.js, app/data/benefits-dao.js]
    secure_source: []
    notes: isAdmin middleware not applied; any logged-in user can set benefit dates.

  - id: nodegoat-csrf
    category: Cross-Site Request Forgery
    cwe: [CWE-352]
    owasp: A01:2021-Broken Access Control
    route: POST (all state-changing)
    parameter: []
    vulnerable_source: [server.js]
    secure_source: []
    notes: csurf require and app.use(csrf()) commented out.

  - id: nodegoat-ssrf
    category: Server-Side Request Forgery
    cwe: [CWE-918]
    owasp: A10:2021-Server-Side Request Forgery
    route: GET /research
    parameter: [url, symbol]
    vulnerable_source: [app/routes/research.js]
    secure_source: []
    notes: needle.get(req.query.url + req.query.symbol).

  - id: nodegoat-open-redirect
    category: Open Redirect
    cwe: [CWE-601]
    owasp: A01:2021-Broken Access Control
    route: GET /learn
    parameter: [url]
    vulnerable_source: [app/routes/index.js]
    secure_source: []
    notes: res.redirect(req.query.url), lines ~70-73.

  - id: nodegoat-plaintext-password
    category: Plaintext Password Storage & Comparison
    cwe: [CWE-256]
    owasp: A02:2021-Cryptographic Failures
    route: POST /signup, POST /login
    parameter: [password]
    vulnerable_source: [app/data/user-dao.js]
    secure_source: []
    notes: stores raw password; comparePassword does fromDB === fromUser; bcrypt fix commented out.

  - id: nodegoat-weak-password-policy
    category: Weak Password Policy
    cwe: [CWE-521]
    owasp: A07:2021-Identification and Authentication Failures
    route: POST /signup
    parameter: [password]
    vulnerable_source: [app/routes/session.js]
    secure_source: []
    notes: PASS_RE = /^.{1,20}$/.

  - id: nodegoat-user-enumeration
    category: Username Enumeration / No Session Regeneration
    cwe: [CWE-204]
    owasp: A07:2021-Identification and Authentication Failures
    route: POST /login
    parameter: [userName]
    vulnerable_source: [app/routes/session.js]
    secure_source: []
    notes: distinct errors for bad user vs bad password; session id not regenerated on login.

  - id: nodegoat-sensitive-data-cleartext
    category: Sensitive Data Exposure (SSN/DOB cleartext)
    cwe: [CWE-311]
    owasp: A02:2021-Cryptographic Failures
    route: GET/POST /profile
    parameter: [ssn, dob]
    vulnerable_source: [app/data/profile-dao.js]
    secure_source: []
    notes: encrypt/decrypt helpers commented out; values stored plaintext.

  - id: nodegoat-cleartext-transport
    category: Missing Transport Security (HTTP)
    cwe: [CWE-319]
    owasp: A02:2021-Cryptographic Failures
    route: /
    parameter: []
    vulnerable_source: [server.js]
    secure_source: []
    notes: http.createServer used; HTTPS block commented out.

  - id: nodegoat-hardcoded-secrets
    category: Hardcoded Secrets / Weak Crypto Key
    cwe: [CWE-798]
    owasp: A02:2021-Cryptographic Failures
    route: /
    parameter: []
    vulnerable_source: [config/env/all.js]
    secure_source: []
    notes: cookieSecret, cryptoKey hardcoded; cryptoAlgo aes256.

  - id: nodegoat-security-misconfig
    category: Insecure Cookie / Missing Security Headers (Helmet)
    cwe: [CWE-16]
    owasp: A05:2021-Security Misconfiguration
    route: /
    parameter: []
    vulnerable_source: [server.js]
    secure_source: []
    notes: session cookie missing httpOnly/secure; Helmet frameguard/CSP/HSTS/noCache/nosniff and x-powered-by disable commented out.

  - id: nodegoat-vulnerable-dependency
    category: Vulnerable & Outdated Components (marked)
    cwe: [CWE-1104]
    owasp: A06:2021-Vulnerable and Outdated Components
    route: GET /memos
    parameter: []
    vulnerable_source: [server.js, package.json, app/views/memos.html]
    secure_source: []
    notes: outdated marked with XSS via markdown.

  - id: nodegoat-redos
    category: Regular Expression Denial of Service
    cwe: [CWE-1333]
    owasp: A05:2021-Security Misconfiguration
    route: POST /profile
    parameter: [bankRouting]
    vulnerable_source: [app/routes/profile.js]
    secure_source: []
    notes: const regexPattern = /([0-9]+)+#/ (nested quantifier), line ~59.

  - id: nodegoat-hpp
    category: HTTP Parameter Pollution / Type-Confusion
    cwe: [CWE-235]
    owasp: A03:2021-Injection
    route: POST /profile
    parameter: [profile fields]
    vulnerable_source: [app/routes/profile.js]
    secure_source: []
    notes: string methods on possibly-array params, lines ~95-96.
